<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tourbillon V22 Showcase</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
body { margin: 0; min-height: 100vh; background: #11151a; color: #eef1f4; font-family: system-ui, sans-serif; }
main { display: grid; grid-template-columns: minmax(0, 1fr) 320px; min-height: 100vh; }
model-viewer { width: 100%; height: 100vh; background: radial-gradient(circle at 55% 30%, #26313b 0, #11151a 54%); }
aside { padding: 20px; border-left: 1px solid #303942; background: #171d23; }
button { display: inline-flex; margin: 0 8px 8px 0; padding: 9px 12px; border: 1px solid #53606d; border-radius: 6px; background: #242c34; color: #f4f6f8; cursor: pointer; }
.legend { display: grid; gap: 8px; margin-top: 16px; font-size: 14px; }
.swatch { width: 14px; height: 14px; display: inline-block; border-radius: 3px; margin-right: 8px; vertical-align: -2px; }
@media (max-width: 760px) { main { grid-template-columns: 1fr; } model-viewer { height: 72vh; } aside { border-left: 0; border-top: 1px solid #303942; } }
</style>
</head>
<body>
<main>
<model-viewer id="viewer" src="assets/v22_showcase_theta_000.glb" camera-controls auto-rotate camera-orbit="38deg 62deg 0.24m" field-of-view="27deg" exposure="1.05" shadow-intensity="0.55"></model-viewer>
<aside>
<h1>Tourbillon V22 Showcase</h1>
<div><button data-src='assets/v22_showcase_theta_000.glb'>0 deg</button>
<button data-src='assets/v22_showcase_theta_090.glb'>90 deg</button>
<button data-src='assets/v22_showcase_theta_180.glb'>180 deg</button>
<button data-src='assets/v22_showcase_theta_270.glb'>270 deg</button></div>
<div class="legend">
<div><span class="swatch" style="background:#dcb45c"></span>rotating cage / balance</div>
<div><span class="swatch" style="background:#e27e30"></span>moving pinion / escape wheel</div>
<div><span class="swatch" style="background:#557daa"></span>fixed ring, visually subdued</div>
<div><span class="swatch" style="background:#d21c3c"></span>jewel pivots</div>
</div>
<p>V21 mechanical gates are preserved. V22 adds a visible showcase escapement carried by the rotating cage.</p>
</aside>
</main>
<script>
const viewer = document.querySelector('#viewer');
document.querySelectorAll('button[data-src]').forEach(btn => btn.addEventListener('click', () => { viewer.src = btn.dataset.src; }));
</script>
</body>
</html>
