<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V26 Tourbillon Motion Viewer</title><style>
body{margin:0;background:#111820;color:#eef3f6;font-family:system-ui,sans-serif}main{display:grid;grid-template-columns:1fr 320px;min-height:100vh}.stage{display:grid;place-items:center;overflow:hidden}.panel{padding:18px;background:#17212b;border-left:1px solid #334452}button{border:1px solid #6e8092;background:#243442;color:#fff;border-radius:6px;padding:8px 10px;margin:0 6px 8px 0}svg{width:min(92vw,900px);height:auto}.thin{color:#aab7c4;font-size:14px;line-height:1.45}@media(max-width:760px){main{grid-template-columns:1fr}.panel{border-left:0;border-top:1px solid #334452}}</style></head><body><main><section class="stage"><svg id="s" viewBox="-90 -90 180 180"><rect x="-90" y="-90" width="180" height="180" fill="#111820"/><g id="fixed"><circle r="72" fill="#222a30"/><circle r="55.8" fill="#111820"/><circle r="54" fill="none" stroke="#6fa0bf" stroke-width="3"/><g id="ringTeeth"></g><circle cx="0" cy="-58.5" r="13.5" fill="none" stroke="#cc6092" stroke-width="2"/></g><g id="carrier"><circle r="45" fill="none" stroke="#d7a94c" stroke-width="3"/><line x1="0" y1="0" x2="40.5" y2="0" stroke="#d7a94c" stroke-width="3"/><line x1="-18" y1="10" x2="10" y2="-12" stroke="#c8d0d6" stroke-width="2"/><g id="orbit"><circle cx="40.5" cy="0" r="13.5" fill="none" stroke="#e8792d" stroke-width="3"/><g id="escape"><circle cx="40.5" cy="0" r="7.5" fill="none" stroke="#efce6e" stroke-width="2"/></g></g><g id="balance"><circle cx="-18" cy="10" r="13" fill="none" stroke="#f0d170" stroke-width="2"/><line x1="-31" y1="10" x2="-5" y2="10" stroke="#f0d170" stroke-width="1.5"/></g><g id="pallet"><line x1="-2" y1="-14" x2="22" y2="-10" stroke="#e8e0d3" stroke-width="3"/><circle cx="10" cy="-12" r="2" fill="#da1841"/></g><circle cx="40.5" cy="0" r="2.5" fill="#da1841"/><circle cx="-18" cy="10" r="2.5" fill="#da1841"/></g><g id="hand"><circle cx="0" cy="-58.5" r="13.5" fill="none" stroke="#cc6092" stroke-width="3"/><line x1="0" y1="-58.5" x2="0" y2="-83" stroke="#cc6092" stroke-width="4"/><circle cx="0" cy="-83" r="5" fill="#cc6092"/></g></svg></section><aside class="panel"><h1>V26 Local Motion</h1><button id="play">Pause</button><button id="slow">Slow</button><button id="fast">Fast</button><p class="thin">Hand crank drives the carrier. The fixed internal ring drives the orbit/escape shaft. The balance and pallet are carrier-mounted visual roles with explicit supports.</p><p class="thin">Fallback motion verified locally; native Onshape Gear Relation remains blocked.</p></aside></main><script>
const NS='http://www.w3.org/2000/svg';const teeth=document.getElementById('ringTeeth');for(let i=0;i<72;i++){const a=i*360/72;const p=document.createElementNS(NS,'path');p.setAttribute('d','M52.2 0 L56.8 1.0 L56.8 -1.0 Z');p.setAttribute('fill','#6fa0bf');p.setAttribute('transform',`rotate(${a})`);teeth.appendChild(p)}let t=0,spd=.7,run=true;play.onclick=()=>{run=!run;play.textContent=run?'Pause':'Play'};slow.onclick=()=>spd=.25;fast.onclick=()=>spd=1.4;function loop(){if(run)t+=spd;carrier.setAttribute('transform',`rotate(${t})`);orbit.setAttribute('transform',`rotate(${-4*t} 40.5 0)`);hand.setAttribute('transform',`rotate(${-3.3333333333*t} 0 -58.5)`);escape.setAttribute('transform','rotate(0 40.5 0)');balance.setAttribute('transform',`rotate(${22*Math.sin(t*Math.PI/18)} -18 10)`);pallet.setAttribute('transform',`rotate(${12*Math.sin(t*Math.PI/18+1)} 10 -12)`);requestAnimationFrame(loop)}loop();
</script></body></html>
