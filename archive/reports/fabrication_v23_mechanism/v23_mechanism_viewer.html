<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tourbillon V23 Mechanism Object</title><script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>body{margin:0;background:#111820;color:#eef2f4;font-family:system-ui,sans-serif}main{display:grid;grid-template-columns:1fr 300px;min-height:100vh}model-viewer{height:100vh;width:100%;background:radial-gradient(circle at 55% 25%,#2d3945,#111820 58%)}aside{padding:18px;background:#171f27;border-left:1px solid #34404b}button{margin:0 6px 8px 0;padding:8px 10px;border-radius:6px;border:1px solid #5d6873;background:#26313b;color:white}@media(max-width:760px){main{grid-template-columns:1fr}model-viewer{height:72vh}}</style>
</head><body><main><model-viewer id="v" src="assets/v23_mechanism_theta_000.glb" camera-controls auto-rotate camera-orbit="32deg 55deg 0.20m" field-of-view="28deg" exposure="1.1" shadow-intensity=".7"></model-viewer><aside><h1>V23 moving tourbillon object</h1><button data-src='assets/v23_mechanism_theta_000.glb'>0 deg</button>
<button data-src='assets/v23_mechanism_theta_060.glb'>60 deg</button>
<button data-src='assets/v23_mechanism_theta_120.glb'>120 deg</button>
<button data-src='assets/v23_mechanism_theta_180.glb'>180 deg</button>
<button data-src='assets/v23_mechanism_theta_240.glb'>240 deg</button>
<button data-src='assets/v23_mechanism_theta_300.glb'>300 deg</button><p>Carrier, orbit pinion, balance, escape wheel, and pallet fork are supported on visible axes. Fixed ring is full, smaller, rear-layered, and visually subdued so the moving carrier remains the front signal.</p></aside></main><script>const v=document.querySelector('#v');document.querySelectorAll('button').forEach(b=>b.onclick=()=>v.src=b.dataset.src);</script></body></html>
